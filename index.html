<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Larissa Alves Linhares | Link na Bio</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Cormorant Garamond (Elegante/Serif) e Montserrat (Moderna/Clean) -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-page: #D2C4B8;
            --text-dark: #3D2B1F;
            --btn-color: #593D2B; /* Marrom sofisticado unificado para todos os botões */
        }

        body {
            background-color: var(--bg-page);
            font-family: 'Montserrat', sans-serif;
            color: var(--text-dark);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }

        /* Tipografia Premium */
        .premium-name {
            font-family: 'Cormorant Garamond', serif;
            letter-spacing: 0.15em;
        }

        /* Card Principal */
        .main-card {
            background: #FFFFFF;
            width: 100%;
            max-width: 380px;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(61, 43, 31, 0.25);
            position: relative;
        }

        /* Banner */
        .banner-container {
            width: 100%;
            height: 150px;
            background-color: #EAE0D5; /* Cor de fundo caso a imagem falhe */
            overflow: hidden;
        }

        .banner-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Foto de Perfil */
        .profile-img {
            width: 115px;
            height: 115px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #FFFFFF;
            margin: -60px auto 0;
            display: block;
            box-shadow: 0 8px 20px rgba(0,0,0,0.12);
            position: relative;
            z-index: 10;
        }

        /* Botões Unificados com efeito de clarear */
        .btn-link {
            background-color: var(--btn-color);
            color: #FFFFFF;
            border-radius: 16px;
            padding: 18px 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 13px;
            font-weight: 500;
            width: 100%;
            text-decoration: none;
            position: relative;
        }

        /* Efeito de clarear ao interagir */
        .btn-link:hover, .btn-link:active {
            filter: brightness(1.3); /* Clareia a cor base */
            transform: scale(1.02);
        }

        .btn-link:active {
            transform: scale(0.98);
        }

        .icon-pos {
            position: absolute;
            left: 20px;
            width: 20px;
            height: 20px;
            opacity: 0.9;
        }

        /* Divisor */
        .divider {
            height: 1px;
            background: linear-gradient(to right, transparent, #EAE0D5, transparent);
            width: 80%;
            margin: 22px auto;
        }

        /* Animação suave */
        .fade-up {
            animation: fadeUp 0.8s ease-out forwards;
            opacity: 0;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="w-full max-w-[380px] fade-up">
        <main class="main-card">
            
            <!-- Banner (Substitua por Banner.png na sua pasta) -->
            <div class="banner-container">
                <img src="Banner.png" alt="Banner" class="banner-img" onerror="this.style.display='none'">
            </div>

            <!-- Foto de Perfil (Substitua por Fotoperfil.png na sua pasta) -->
            <img src="Fotoperfil.png" alt="Larissa Alves Linhares" class="profile-img" onerror="this.src='https://ui-avatars.com/api/?name=Larissa+Alves&background=593D2B&color=fff'">

            <div class="px-8 pt-6 pb-10 text-center">
                <!-- Nome com Fonte Serif Premium -->
                <h1 class="premium-name text-[26px] font-semibold tracking-widest leading-tight" style="color: var(--text-dark);">
                    LARISSA ALVES LINHARES
                </h1>
                
                <p class="text-[11px] font-medium mt-2 opacity-50 uppercase tracking-[0.3em]">
                    criadora de conteúdo digital
                </p>
                
                <div class="divider"></div>

                <!-- Bio -->
                <p class="text-[14px] leading-relaxed text-gray-500 mb-8 font-light italic">
                    Oiê, aqui é a Lari<br>
                    Compartilho conteúdos de lifestyle, beleza e maquiagem de um jeito leve e autêntico.<br>
                    Aqui você encontra minhas outras redes sociais <span style="color: #9D67EF;">💜</span>
                </p>

                <!-- Lista de Botões (Espaçamento perfeitamente igual) -->
                <div class="flex flex-col space-y-3">
                    
                    <a href="https://www.instagram.com/larissalinhareesz?igsh=Y3JwMmtxM3h6ZWs5" target="_blank" class="btn-link">
                        <i data-lucide="instagram" class="icon-pos"></i>
                        <span>Instagram</span>
                    </a>

                    <a href="https://www.tiktok.com/@larissalinhareesz?_r=1&_t=ZS-94LvBtaxqMf" target="_blank" class="btn-link">
                        <svg class="icon-pos" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.62-.93-.01 2.92.01 5.84-.02 8.75-.03 1.4-.54 2.79-1.35 3.94-1.31 1.92-3.58 3.17-5.91 3.21-1.43.08-2.86-.31-4.08-1.03-2.02-1.19-3.44-3.37-3.65-5.71-.02-.5-.03-1-.01-1.49.18-1.9 1.12-3.72 2.58-4.96 1.66-1.44 3.98-2.13 6.15-1.72.02 1.48-.04 2.96-.04 4.44-.9-.32-1.98-.23-2.81.31-.75.42-1.24 1.25-1.33 2.1-.1.7.1 1.41.54 1.96.44.53 1.06.88 1.72 1.03.75.15 1.55.03 2.22-.35.6-.33.98-.94 1.11-1.59.13-.64.12-1.31.12-1.96V.02z"/>
                        </svg>
                        <span>TikTok</span>
                    </a>

                    <a href="mailto:linharesparceria@gmail.com" class="btn-link">
                        <i data-lucide="mail" class="icon-pos"></i>
                        <span>Email</span>
                    </a>

                </div>
            </div>
        </main>

        <!-- Rodapé -->
        <footer class="mt-10 mb-8 text-center">
            <p class="text-[10px] font-semibold opacity-40 uppercase tracking-[0.3em]" style="color: var(--text-dark);">
                © 2026 Larissa Alves Linhares
            </p>
        </footer>
    </div>

    <script>
        // Inicializa os ícones do Lucide
        lucide.createIcons();
    </script>
</body>
</html>
